services:
  prometheus:
    image: prom/prometheus:latest
    container_name: smoltorrent-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: smoltorrent-loki
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: smoltorrent-promtail
    volumes:
      - ./promtail/promtail-mac.yaml:/etc/promtail/promtail.yaml:ro
      - ${HOME}/smoltorrent/logging/cluster-logs:/var/log/smoltorrent:ro
    command: -config.file=/etc/promtail/promtail.yaml
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: smoltorrent-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=smoltorrent
      - GF_USERS_ALLOW_SIGN_UP=false
      # --- Gmail SMTP (fill in your 16-char app password) ---
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_FROM}
      - GF_SMTP_FROM_NAME=SmolTorrent Grafana
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
