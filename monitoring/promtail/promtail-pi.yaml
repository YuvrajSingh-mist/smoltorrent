server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://LOKI_IP:3100/loki/api/v1/push

scrape_configs:
  - job_name: smoltorrent-worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: smoltorrent
          node: __HOSTNAME__
          __path__: /tmp/smolcluster-logs/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<level>INFO|WARNING|ERROR|CRITICAL|DEBUG)'
      - labels:
          level:
