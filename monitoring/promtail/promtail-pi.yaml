# Promtail config template for Pi workers.
#
# Do NOT edit manually — deploy via:
#   bash scripts/launch_monitoring.sh --install-pi-promtail
#
# The script reads configs/config.yaml and substitutes all placeholders:
#   LOKI_IP    — master Tailscale IP
#   NODE_LABEL — SSH host alias for this worker
#   RANK       — worker rank number
#   PI_USER    — resolved on each Pi via `whoami`

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://LOKI_IP:3100/loki/api/v1/push

scrape_configs:
  - job_name: smoltorrent-worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: smoltorrent
          node: NODE_LABEL
          rank: "RANK"
          __path__: /home/PI_USER/Desktop/smoltorrent/logging/cluster-logs/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\s+(?P<level>\w+)\s+.*\[(?P<component>[^\]]+)\]'
      - labels:
          level:
          component:
