server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: smoltorrent
    static_configs:
      - targets:
          - localhost
        labels:
          job: smoltorrent
          node: master
          __path__: /var/log/smoltorrent/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\s+(?P<level>\w+)\s+.*\[(?P<component>[^\]]+)\]'
      - labels:
          level:
          component:
