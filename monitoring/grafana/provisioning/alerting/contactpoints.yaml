apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: ${GRAFANA_TELEGRAM_BOT_TOKEN}
          chatid: "6116250294"
          uploadImage: false
          message: |
            {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} <b>{{ .Alerts.Firing | len }} firing</b>{{ if gt (len .Alerts.Resolved) 0 }} · {{ len .Alerts.Resolved }} resolved{{ end }}
            {{ range .Alerts }}
            ━━━━━━━━━━━━━━━━
            <b>{{ .Labels.alertname }}</b> — <code>{{ .Status }}</code>
            {{ if .Annotations.summary }}<i>{{ .Annotations.summary }}</i>{{ end }}
            {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}

            {{ range .Labels.SortedPairs }}{{ if not (eq .Name "alertname") }}· <b>{{ .Name }}</b>: <code>{{ .Value }}</code>
            {{ end }}{{ end }}
            {{ end }}
