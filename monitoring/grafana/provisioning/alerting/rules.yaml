apiVersion: 1

deleteRules:
  - orgId: 1
    uid: transfer-latency-high

groups:
  - orgId: 1
    name: smoltorrent
    folder: SmolTorrent
    interval: 1m
    rules:

      # ── API ────────────────────────────────────────────────────────────────

      - uid: api-dead
        title: API Down
        condition: A
        for: 30s
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="smoltorrent-api"} == bool 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "SmolTorrent API is down"
          description: "Prometheus cannot scrape :8000. FastAPI may have crashed."
        labels:
          severity: critical

      - uid: watcher-down
        title: Watcher Process Down
        condition: A
        for: 30s
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="smoltorrent-watcher"} == bool 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "SmolTorrent watcher process is unreachable"
          description: "Prometheus cannot scrape the watcher at :8001. The watcher monitors cluster health — if it's down, node failure detection is blind."
        labels:
          severity: warning

      # ── Workers ────────────────────────────────────────────────────────────

      - uid: worker-down
        title: Pi Worker Down
        condition: A
        for: 30s
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="node", node=~"pi4-.*"} == bool 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} is unreachable"
          description: "Prometheus cannot scrape node_exporter on {{ $labels.node }}. The Pi machine may be offline or node_exporter crashed."
        labels:
          severity: critical

      - uid: worker-transfer-errors
        title: Worker Transfer Errors
        condition: A
        for: 0s
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              # Use >= 1 not > 0: increase() extrapolates and can return small floats
              # (e.g. 0.0003) when no real increase occurred, causing false positives.
              expr: increase(smoltorrent_transfer_errors_total[5m]) >= 1
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Worker rank {{ $labels.rank }} has transfer errors"
          description: "Permanent shard transfer failures detected on rank {{ $labels.rank }}. Pi may be down or port dead."
        labels:
          severity: warning

      # ── Server ─────────────────────────────────────────────────────────────

      - uid: server-down
        title: Server Node Exporter Down
        condition: A
        for: 30s
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="node", node="master"} == bool 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server node_exporter process is down"
          description: "Prometheus cannot scrape node_exporter on the master server. The node_exporter process may have crashed — system stats (CPU, disk, memory) will be missing."
        labels:
          severity: warning

      - uid: server-cpu-high
        title: Server CPU High
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{job="node",node="master",mode="idle"}[5m])) * 100) > 90
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server CPU above 90%"
          description: "Server CPU sustained above 90% (5m rolling avg) for 2+ min."
        labels:
          severity: warning

      - uid: server-disk-low
        title: Server Disk Low
        condition: A
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_filesystem_avail_bytes{job="node",node="master",mountpoint="/"} < 5 * 1024 * 1024 * 1024
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server disk below 5 GB free"
          description: "Root filesystem on the server has less than 5 GB available."
        labels:
          severity: warning

      - uid: server-memory-high
        title: Server Memory High
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              # macOS node_exporter has no node_memory_available_bytes.
              # Proxy: free + inactive = reclaimable. Pressure = everything else / total.
              expr: (node_memory_total_bytes{job="node",node="master"} - node_memory_free_bytes{job="node",node="master"} - node_memory_inactive_bytes{job="node",node="master"}) / node_memory_total_bytes{job="node",node="master"} * 100 > 90
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server RAM pressure above 90%"
          description: "Mac Mini active+wired memory exceeds 90% of total RAM for 2+ min. ML training or large model loading likely cause — check if swap is growing."
        labels:
          severity: warning

      - uid: server-swap-high
        title: Server Swap High
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_memory_swap_used_bytes{job="node",node="master"} / node_memory_swap_total_bytes{job="node",node="master"} * 100 > 80
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server swap above 80%"
          description: "Mac Mini swap is more than 80% full. Heavy paging will slow everything — kill unused processes or increase swap."
        labels:
          severity: warning

      # ── Transfer performance ───────────────────────────────────────────────
      # Two independent paths: send (coordinator→Pi, store) and recv (Pi→coordinator, gather).
      # All windows are [5m] for consistency. "Active" guard (> 0) ensures rules only
      # fire during actual transfers, not when idle (noDataState: OK handles no-metric case).

      - uid: transfer-bandwidth-low
        title: Store Send Bandwidth Low
        condition: A
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              # Fires when store (coordinator→Pi) send rate drops below 5 Mbps while active.
              # WiFi baseline ~9 Mbps; 5 Mbps = ~55% of baseline — clear degradation.
              # {job="smoltorrent-api"} scopes to coordinator-side counters only — prevents
              # gather traffic (job=worker-metrics bytes_sent) from triggering this store alert.
              # increase([1m]) > 0 = bytes sent in the last minute (drops within ~1m of transfer end).
              # rate([5m]) < 5 = smoothed bandwidth check. Separating the activity guard from
              # the bandwidth measurement prevents false fires during the post-transfer cool-down
              # tail where rate([5m]) stays non-zero for up to 5m after the last byte.
              expr: (increase(smoltorrent_bytes_sent_total{job="smoltorrent-api"}[1m]) > 0) and (rate(smoltorrent_bytes_sent_total{job="smoltorrent-api"}[5m]) * 8 / 1024 / 1024 < 5)
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Store send bandwidth below 5 Mbps"
          description: "Active store transfer but send bandwidth &lt; 5 Mbps for 2 min. WiFi baseline ~9 Mbps. Check network or Pi load."
        labels:
          severity: warning

      - uid: transfer-too-slow
        title: Gather Recv Bandwidth Low
        condition: A
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              # Fires when gather (Pi→coordinator) recv rate drops below 5 Mbps while active.
              # {job="smoltorrent-api"} scopes to coordinator-side counters only — prevents
              # store traffic (job=worker-metrics bytes_recv) from triggering this gather alert.
              # Mirrors transfer-bandwidth-low but covers the receive path so both store and
              # gather slowdowns are caught independently. Same increase([1m]) activity guard
              # to suppress post-transfer false fires.
              expr: (increase(smoltorrent_bytes_recv_total{job="smoltorrent-api"}[1m]) > 0) and (rate(smoltorrent_bytes_recv_total{job="smoltorrent-api"}[5m]) * 8 / 1024 / 1024 < 5)
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Gather recv bandwidth below 5 Mbps"
          description: "Active gather but recv bandwidth &lt; 5 Mbps for 2 min. WiFi baseline ~9 Mbps. Check network or Pi load."
        labels:
          severity: warning

      # ── Pi system health ───────────────────────────────────────────────────

      - uid: pi-memory-high
        title: Pi Memory High
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              # Linux node_exporter exposes MemAvailable (free + reclaimable cache).
              expr: (1 - node_memory_MemAvailable_bytes{job="node",node=~"pi4-.*"} / node_memory_MemTotal_bytes{job="node",node=~"pi4-.*"}) * 100 > 85
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} memory above 85%"
          description: "{{ $labels.node }} RAM usage above 85% for 2+ min. Worker may be holding large tensors in RAM or leaking memory."
        labels:
          severity: warning

      - uid: pi-cpu-high
        title: Pi CPU High
        condition: A
        for: 3m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 100 - (avg by (node) (rate(node_cpu_seconds_total{job="node",node=~"pi4-.*",mode="idle"}[5m])) * 100) > 90
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} CPU above 90%"
          description: "{{ $labels.node }} CPU sustained above 90% for 3+ min. Normal during shard store (~2 min) — if longer, check for runaway process."
        labels:
          severity: warning

      - uid: pi-temp-high
        title: Pi Temperature High
        condition: A
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_thermal_zone_temp{job="node",node=~"pi4-.*",zone="0"} > 80
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} temperature above 80°C"
          description: "{{ $labels.node }} SoC temperature is above 80°C — CPU throttling is likely."
        labels:
          severity: warning

      - uid: pi-disk-low
        title: Pi Disk Low
        condition: A
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_filesystem_avail_bytes{job="node",node=~"pi4-.*",mountpoint="/"} < 2 * 1024 * 1024 * 1024
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} disk below 2 GB free"
          description: "{{ $labels.node }} SD card has less than 2 GB available. Old shards may need clearing."
        labels:
          severity: warning
