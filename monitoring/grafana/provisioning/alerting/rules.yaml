apiVersion: 1

groups:
  - orgId: 1
    name: smoltorrent
    folder: SmolTorrent
    interval: 1m
    rules:

      # ── API ────────────────────────────────────────────────────────────────

      - uid: api-dead
        title: API Down
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="smoltorrent-api"} == 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "SmolTorrent API is down"
          description: "Prometheus cannot scrape :8000. FastAPI may have crashed."
        labels:
          severity: critical

      # ── Workers ────────────────────────────────────────────────────────────

      - uid: worker-down
        title: Pi Worker Down
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="node", node=~"pi4-.*"} == 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} is unreachable"
          description: "Prometheus cannot scrape node_exporter on {{ $labels.node }}. The Pi machine may be offline or node_exporter crashed."
        labels:
          severity: critical

      - uid: worker-transfer-errors
        title: Worker Transfer Errors
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: increase(smoltorrent_transfer_errors_total[5m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Worker rank {{ $labels.rank }} has transfer errors"
          description: "Permanent shard transfer failures detected on rank {{ $labels.rank }}. Pi may be down or port dead."
        labels:
          severity: warning

      # ── Server ─────────────────────────────────────────────────────────────

      - uid: server-down
        title: Server Node Exporter Down
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: up{job="node", node="master"} == 0
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server node_exporter process is down"
          description: "Prometheus cannot scrape node_exporter on the master server. The node_exporter process may have crashed — system stats (CPU, disk, memory) will be missing."
        labels:
          severity: warning

      - uid: server-cpu-high
        title: Server CPU High
        condition: A
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{job="node",node="master",mode="idle"}[5m])) * 100) > 90
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server CPU above 90%"
          description: "Server CPU has been above 90% for 5 minutes."
        labels:
          severity: warning

      - uid: server-disk-low
        title: Server Disk Low
        condition: A
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_filesystem_avail_bytes{job="node",node="master",mountpoint="/"} < 5 * 1024 * 1024 * 1024
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Server disk below 5 GB free"
          description: "Root filesystem on the server has less than 5 GB available."
        labels:
          severity: warning

      # ── Transfer performance ───────────────────────────────────────────────

      - uid: transfer-bandwidth-low
        title: Transfer Bandwidth Low
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: (smoltorrent_send_bandwidth_mbps > 0) < 10
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Send bandwidth below 10 Mbps during active transfer"
          description: "A transfer is in progress but send bandwidth has dropped below 10 Mbps for 2 min. Expected ~25 Mbps per worker on a 100 Mbps link. Check network or Pi load."
        labels:
          severity: warning


      - uid: transfer-too-slow
        title: Transfer p95 Too Slow
        condition: A
        for: 3m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: histogram_quantile(0.95, rate(smoltorrent_send_duration_seconds_bucket[5m])) > 120
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Send p95 latency exceeds 2 minutes"
          description: "95th percentile send duration above 2 min. Likely: slow Pi SD card, network congestion, or Pi under memory pressure."
        labels:
          severity: warning

      - uid: transfer-latency-high
        title: Transfer Latency High
        condition: A
        for: 3m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: smoltorrent_avg_send_latency_ms > 5000
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Average send latency above 5 seconds"
          description: "Rolling average TCP send latency has exceeded 5000 ms. Check network and Pi load."
        labels:
          severity: warning

      # ── Pi system health ───────────────────────────────────────────────────

      - uid: pi-cpu-high
        title: Pi CPU High
        condition: A
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 100 - (avg by (node) (rate(node_cpu_seconds_total{job="node",node=~"pi4-.*",mode="idle"}[5m])) * 100) > 90
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} CPU above 90%"
          description: "{{ $labels.node }} CPU has been above 90% for 5 minutes."
        labels:
          severity: warning

      - uid: pi-temp-high
        title: Pi Temperature High
        condition: A
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_thermal_zone_temp{job="node",node=~"pi4-.*",zone="0"} > 80
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} temperature above 80°C"
          description: "{{ $labels.node }} SoC temperature is above 80°C — CPU throttling is likely."
        labels:
          severity: warning

      - uid: pi-disk-low
        title: Pi Disk Low
        condition: A
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: node_filesystem_avail_bytes{job="node",node=~"pi4-.*",mountpoint="/"} < 2 * 1024 * 1024 * 1024
              intervalMs: 1000
              maxDataPoints: 43200
              instant: true
        annotations:
          summary: "Pi {{ $labels.node }} disk below 2 GB free"
          description: "{{ $labels.node }} SD card has less than 2 GB available. Old shards may need clearing."
        labels:
          severity: warning
