<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 160" font-family="'Noto Sans',monospace,Arial,sans-serif">
  <rect width="620" height="160" fill="#f8f9fa"/>

  <text x="310" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e1e1e">TCP Wire Format — length-prefixed pickle frame</text>

  <!-- Length header box -->
  <rect x="30" y="40" width="120" height="60" rx="6" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
  <text x="90" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e1e1e">4 bytes</text>
  <text x="90" y="81" text-anchor="middle" font-size="11" fill="#555">big-endian</text>
  <text x="90" y="94" text-anchor="middle" font-size="11" fill="#555">uint32  (len N)</text>

  <!-- Payload box -->
  <rect x="155" y="40" width="435" height="60" rx="6" fill="#d0bfff" stroke="#7048e8" stroke-width="2"/>
  <text x="372" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e1e1e">N bytes</text>
  <text x="372" y="81" text-anchor="middle" font-size="11" fill="#555">pickle.dumps(message)  —  any Python tuple/object</text>
  <text x="372" y="96" text-anchor="middle" font-size="10" fill="#888">e.g.  ("store_shard", rank, shard_bytes, checksum, rel_path)</text>

  <!-- Annotation: struct.pack -->
  <line x1="90" y1="100" x2="90" y2="120" stroke="#e8590c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="90" y="133" text-anchor="middle" font-size="10" fill="#e8590c">struct.pack("&gt;I", N)</text>

  <!-- Annotation: recv_into / memoryview -->
  <line x1="372" y1="100" x2="372" y2="120" stroke="#7048e8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="372" y="133" text-anchor="middle" font-size="10" fill="#7048e8">recv_into(memoryview(buf)[received:], 65536)  — zero-copy</text>
</svg>
