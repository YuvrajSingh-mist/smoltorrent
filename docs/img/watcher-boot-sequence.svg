<line x1="235" y1="542" x2="235" y2="609" stroke="#495057" stroke-width="2" marker-end="url(#adk)"/>
<line x1="235" y1="736" x2="235" y2="774" stroke="#495057" stroke-width="2" marker-end="url(#adk)"/>
<line x1="235" y1="834" x2="235" y2="884" stroke="#495057" stroke-width="2" marker-end="url(#adk)"/>
<line x1="235" y1="944" x2="235" y2="982" stroke="#495057" stroke-width="2" marker-end="url(#adk)"/>
<line x1="235" y1="1042" x2="235" y2="1109" stroke="#495057" stroke-width="2" marker-end="url(#adk)"/>
<line x1="235" y1="1236" x2="235" y2="1274" stroke="#495057" stroke-width="2" marker-end="url(#adk)"/>
<line x1="235" y1="638" x2="235" y2="676" stroke="#2f9e44" stroke-width="2" marker-end="url(#agr)"/>
<text x="253" y="651" text-anchor="middle" font-size="10" fill="#2f9e44">Yes</text>
<line x1="235" y1="1138" x2="235" y2="1176" stroke="#2f9e44" stroke-width="2" marker-end="url(#agr)"/>
<text x="251" y="1151" text-anchor="middle" font-size="10" fill="#2f9e44">No</text>
<path d="M 350 609 H 364 V 914 H 390" fill="none" stroke="#868e96" stroke-width="2" marker-end="url(#alt)" stroke-dasharray="5,3"/>
<text x="378" y="600" text-anchor="middle" font-size="10" fill="#868e96">No</text>
<path d="M 120 1109 H 50 V 914 H 80" fill="none" stroke="#e8590c" stroke-width="2" marker-end="url(#ard)"/>
<text x="102" y="1100" text-anchor="middle" font-size="10" fill="#e8590c">Yes</text>
<line x1="640" y1="150" x2="640" y2="188" stroke="#2f9e44" stroke-width="2" marker-end="url(#agr)"/>
<line x1="390" y1="406" x2="500" y2="406" stroke="#7048e8" stroke-width="2" marker-end="url(#apu)"/>
<line x1="500" y1="422" x2="390" y2="422" stroke="#adb5bd" stroke-width="2" marker-end="url(#agy)"/>
<line x1="390" y1="698" x2="500" y2="698" stroke="#f59f00" stroke-width="2" marker-end="url(#aam)"/>
<line x1="500" y1="714" x2="390" y2="714" stroke="#adb5bd" stroke-width="2" marker-end="url(#agy)"/>
<line x1="390" y1="906" x2="500" y2="906" stroke="#2f9e44" stroke-width="2" marker-end="url(#agr)"/>
<line x1="390" y1="1004" x2="500" y2="1004" stroke="#1971c2" stroke-width="2" marker-end="url(#abl)"/>
<line x1="500" y1="1020" x2="390" y2="1020" stroke="#adb5bd" stroke-width="2" marker-end="url(#agy)"/>
